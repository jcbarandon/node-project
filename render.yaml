# Render Blueprint. In the Render dashboard: New > Blueprint, then point it at this repo.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: node-project-db
    plan: free

services:
  - type: web
    name: node-project
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Render injects the managed Postgres connection string here.
      - key: DATABASE_URL
        fromDatabase:
          name: node-project-db
          property: connectionString
      # Internal Render Postgres connections don't need SSL.
      - key: DATABASE_SSL
        value: false
      # Render generates a strong random value and keeps it stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22
